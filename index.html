<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Ikhsan Akbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        a:hover, i:hover {
            opacity: 0.7;
            transition: 0.3s;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <h3 style="color: white; text-align: center; margin-bottom: 10px;">Hi, I am</h3> 
    <h1 style="color: white; text-align: center; margin-top: 0">Muhammad Ikhsan Akbar</h1>
    
    <div style="text-align: center; height: 30px;">
        <span id="typing-text" style="color: #ffffff; font-size: 16px; border-right: 2px solid #ffffff; padding-right: 2px; white-space: nowrap;"></span>
    </div>

    <p style="color: white; text-align: center; margin-top: 15vh;">About Me | Journey | Experience</p>

    <div style="text-align: center; margin-top: 10px;">
        <abbr title="Instagram">
            <a href="https://www.instagram.com/iksnakbr" target="_blank" style="text-decoration: none;">
                <i class="fa-brands fa-instagram" style="color: white; font-size: 30px; margin: 0 10px;"></i>
            </a>
        </abbr>
        <abbr title="Discord">
            <a href="https://discordapp.com/users/1386319360590876695" target="_blank" style="text-decoration: none;">
                <i class="fa-brands fa-discord" style="color: white; font-size: 30px; margin: 0 10px;"></i>
            </a>
        </abbr>
        <abbr title="Github">
            <a href="https://github.com/Iksnakbr" target="_blank" style="text-decoration: none;"> 
                <i class="fa-brands fa-github" style="color: white; font-size: 30px; margin: 0 10px;"></i>
            </a> 
        </abbr>
        <abbr title="Gmail">
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=gadotcr444@gmail.com" target="_blank" style="text-decoration: none;">
                <i class="fa-solid fa-envelope" style="color: white; font-size: 30px; margin: 0 10px;"></i>
            </a>
        </abbr>
    </div>
             
    <script>
        const kataKata = ["Information Technology Student", "Web Devloper", "Prompt Engineer"];
        let indeksKata = 0, indeksHuruf = 0, sedangMenghapus = false;
        
        function efekKetik() {
            if (indeksKata === kataKata.length) indeksKata = 0;
            let kataSaatIni = kataKata[indeksKata];
            
            if (sedangMenghapus) {
                document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf - 1);
                indeksHuruf--;
            } else {
                document.getElementById("typing-text").innerHTML = kataSaatIni.substring(0, indeksHuruf + 1);
                indeksHuruf++;
            }
            
            let kecepatan = sedangMenghapus ? 50 : 100;
            
            if (!sedangMenghapus && indeksHuruf === kataSaatIni.length) {
                kecepatan = 2000; sedangMenghapus = true;
            } else if (sedangMenghapus && indeksHuruf === 0) {
                sedangMenghapus = false; indeksKata++; kecepatan = 500;
            }
            setTimeout(efekKetik, kecepatan);
        }
        
        document.addEventListener("DOMContentLoaded", efekKetik);

        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 2000); 
        });
    </script>
</body>
</html>
